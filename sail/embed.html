<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scramjet Embed</title>
    <link rel="icon" href="favicon.webp" />
    <script src="/sail/baremux/index.js"></script>
    <script src="/sail/scram/scramjet.all.js"></script>
    <style>
      body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background-color: #000; font-family: 'Inter', sans-serif; }
      #iframe-container { width: 100%; height: 100%; }
      #iframe-container iframe { width: 100%; height: 100%; border: none; background-color: #fff; }

   
      #settings-wrapper {
        position: fixed;
        top: 15px;
        right: 15px;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 8px;
      }

      .clog-btn {
        width: 32px;
        height: 32px;
        cursor: pointer;
        fill: white;
        transition: transform 0.3s ease;
      }
      .clog-btn:hover { transform: rotate(45deg); }

      #settings-panel {
        display: none; /* Controlled by JS toggle */
        background: rgba(20, 20, 20, 0.9);
        backdrop-filter: blur(10px);
        padding: 15px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        color: white;
        width: 220px;
      }
      #settings-panel.open { display: block; }

      .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
      .close-x { cursor: pointer; font-size: 18px; font-weight: bold; padding: 0 5px; }

      select, input {
        width: 100%;
        background: #000;
        color: #fff;
        border: 1px solid #444;
        padding: 6px;
        border-radius: 6px;
        margin-bottom: 10px;
        font-size: 12px;
        box-sizing: border-box;
      }

      button.save-btn {
        width: 100%;
        background: #fff;
        color: #000;
        border: none;
        padding: 8px;
        border-radius: 6px;
        font-weight: bold;
        cursor: pointer;
      }
    </style>
  </head>
  <body>

    <div id="settings-wrapper">
      <svg class="clog-btn" onclick="toggleSettings()" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">
        <path d="M259.173.5C262.1 58.7 275.2 48 290.4 48L350.2 48C365.4 48 378.5 58.7 381.5 73.5L396 143.5C410.1 149.5 423.3 157.2 435.3 166.3L503.1 143.8C517.5 139 533.3 145 540.9 158.2L570.8 210C578.4 223.2 575.7 239.8 564.3 249.9L511 297.3C511.9 304.7 512.3 312.3 512.3 320C512.3 327.7 511.8 335.3 511 342.7L564.4 390.2C575.8 400.3 578.4 417 570.9 430.1L541 481.9C533.4 495 517.6 501.1 503.2 496.3L435.4 473.8C423.3 482.9 410.1 490.5 396.1 496.6L381.7 566.5C378.6 581.4 365.5 592 350.4 592L290.6 592C275.4 592 262.3 581.3 259.3 566.5L244.9 496.6C230.8 490.6 217.7 482.9 205.6 473.8L137.5 496.3C123.1 501.1 107.3 495.1 99.7 481.9L69.8 430.1C62.2 416.9 64.9 400.3 76.3 390.2L129.7 342.7C128.8 335.3 128.4 327.7 128.4 320C128.4 312.3 128.9 304.7 129.7 297.3L76.3 249.8C64.9 239.7 62.3 223 69.8 209.9L99.7 158.1C107.3 144.9 123.1 138.9 137.5 143.7L205.3 166.2C217.4 157.1 230.6 149.5 244.6 143.4L259.1 73.5zM320.3 400C364.5 399.8 400.2 363.9 400 319.7C399.8 275.5 363.9 239.8 319.7 240C275.5 240.2 239.8 276.1 240 320.3C240.2 364.5 276.1 400.2 320.3 400z" />
      </svg>

      <div id="settings-panel">
        <div class="header">
          <span>Settings</span>
          <span class="close-x" onclick="toggleSettings()">&times;</span>
        </div>
        
        <label style="font-size: 11px; color: #888;">Wisp Server</label>
        <select id="ws-select">
          <option value="default">Default (wisp.classroom.lat)</option>
          <option value="custom">Custom URL</option>
        </select>

        <div id="custom-ws-group" style="display: none;">
          <input type="text" id="custom-ws-input" placeholder="wss://...">
        </div>

        <button class="save-btn" onclick="saveSettings()">Save & Reload</button>
      </div>
    </div>

    <div id="iframe-container"></div>

    <script>
        const defaultWs = "wss://wisp.classroom.lat/";
        let currentWs = localStorage.getItem("proxy-ws") || defaultWs;

        const wsSelect = document.getElementById("ws-select");
        const customWsGroup = document.getElementById("custom-ws-group");
        const customWsInput = document.getElementById("custom-ws-input");

      
        if (currentWs !== defaultWs) {
            wsSelect.value = "custom";
            customWsInput.value = currentWs;
            customWsGroup.style.display = "block";
        }

        navigator.serviceWorker.register("/sail/sw.js");
        const connection = new BareMux.BareMuxConnection("/sail/baremux/worker.js");

        async function applyTransport() {
            await connection.setTransport("/sail/libcurl/index.mjs", [
                { websocket: currentWs }
            ]);
        }
        applyTransport();

        const { ScramjetController } = $scramjetLoadController();
        const scramjet = new ScramjetController({
            files: {
                all: "/sail/scram/scramjet.all.js",
                wasm: "/sail/scram/scramjet.wasm.wasm",
                sync: "/sail/scram/scramjet.sync.js"
            },
            prefix: "/sail/go/"
        });
        scramjet.init();


        function decodeProxiedUrl(u) {
            if (!u) return "";
            try {
                if (u.includes("/sail/go/")) {
                    let part = u.split("/sail/go/")[1] || "";
                    part = decodeURIComponent(part);
                    return part;
                }
                return u;
            } catch { return u; }
        }

        wsSelect.addEventListener("change", () => {
            customWsGroup.style.display = wsSelect.value === "custom" ? "block" : "none";
        });

        function toggleSettings() {
            document.getElementById("settings-panel").classList.toggle("open");
        }

        function saveSettings() {
            if (wsSelect.value === "custom") {
                const custom = customWsInput.value.trim();
                if (!custom) return;
                currentWs = custom;
            } else {
                currentWs = defaultWs;
            }
            localStorage.setItem("proxy-ws", currentWs);
           
            location.reload();
        }

        async function loadFromHash() {
            const hash = window.location.hash.substring(1);
            let url = hash || 'https://google.com/';
            if (!url.startsWith('http')) url = 'https://' + url;

            const container = document.getElementById('iframe-container');
            container.innerHTML = ''; 
            const frame = scramjet.createFrame();
            container.appendChild(frame.frame);
            frame.go(url);
        }

        window.addEventListener('hashchange', loadFromHash);
        window.addEventListener('load', loadFromHash);
    </script>
  </body>
</html>
