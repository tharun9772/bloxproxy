<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body {
            background-color: #050505;
            display: flex;
            flex-direction: column; 
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        h1 {
            color: #fff;
            text-transform: uppercase;
            font-size: 3rem;
            margin-bottom: 40px;
            letter-spacing: 5px;
            text-shadow: 0 0 10px #fff, 0 0 20px #fff;
        }

        .menu-container {
            display: flex;
            gap: 40px;
        }

        .neon-btn {
            font-size: 1.2rem;
            text-transform: uppercase;
            text-decoration: none;
            padding: 15px 30px;
            border: 3px solid;
            border-radius: 10px;
            transition: 0.3s;
            letter-spacing: 1px;
            font-weight: bold;
            text-align: center;
        }

        .option-a {
            color: #00fff2;
            border-color: #00fff2;
            text-shadow: 0 0 10px #00fff2;
            box-shadow: inset 0 0 10px #00fff2, 0 0 10px #00fff2;
        }

        .option-a:hover {
            background: #00fff2;
            color: #050505;
            box-shadow: 0 0 40px #00fff2;
        }

        .option-b {
            color: #ff00ff;
            border-color: #ff00ff;
            text-shadow: 0 0 10px #ff00ff;
            box-shadow: inset 0 0 10px #ff00ff, 0 0 10px #ff00ff;
        }

        .option-b:hover {
            background: #ff00ff;
            color: #050505;
            box-shadow: 0 0 40px #ff00ff;
        }
    </style>
</head>
<body>

    <h1>Select Proxy</h1>
    <div class="menu-container">
        <a href="/active/" class="neon-btn option-a">UV Static 2.0<br><small>(Likely blocked)</small></a>
        <a href="/sail/" class="neon-btn option-b">Scarmjet<br><small>(Likely Unblocked)</small></a>
    </div>
<h1>Scarmjet is the best option</h1>
</body>
</html>
